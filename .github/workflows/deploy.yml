name: Odoo CI/CD

on:
  push:
    branches:
      - master
      - Staging

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build PROD image
        if: github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: 0xjunwei/odoo17-prod:latest

      - name: Build STAGING image
        if: github.ref == 'refs/heads/Staging'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: 0xjunwei/odoo17-staging:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:

      - name: Deploy staging
        if: github.ref == 'refs/heads/Staging'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/odoo-staging
            git pull origin Staging
            
            docker volume create odoo-staging-web-data || true
            docker volume create odoo-staging-db-data || true

            docker compose \
            -f docker-compose.yml \
            -f docker-compose.staging.yml \
            pull

            docker compose \
            -f docker-compose.yml \
            -f docker-compose.staging.yml \
            up -d

      - name: Deploy production
        if: github.ref == 'refs/heads/master'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/odoo-prod
            
            docker tag 0xjunwei/odoo17-prod:latest 0xjunwei/odoo17-prod:rollback || true

            git pull origin master

            # Saving a rollback image incase
            # docker tag 0xjunwei/odoo17-prod:rollback 0xjunwei/odoo17-prod:latest
            # Restart the container using docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker tag 0xjunwei/odoo17-prod:rollback 0xjunwei/odoo17-prod:latest || true
            
            docker volume create odoo-staging-web-data || true
            docker volume create odoo-staging-db-data || true

            docker compose \
            -f docker-compose.yml \
            -f docker-compose.prod.yml \
            pull

            docker compose \
            -f docker-compose.yml \
            -f docker-compose.prod.yml \
            up -d

            echo "Waiting for service health..."

            sleep 30

            if ! curl -f http://localhost:8069 ; then
              echo "Deployment failed, rolling back..."

              docker tag 0xjunwei/odoo17-prod:rollback 0xjunwei/odoo17-prod:latest

              docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              up -d
            fi
